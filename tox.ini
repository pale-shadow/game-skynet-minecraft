[tox]
# Standardizes testing across Python 3.10 and 3.11
envlist = py310, py311, lint, security
isolated_build = True

[testenv]
description = Run the Skynet distributed test suite with coverage
deps =
    -rrequirements.txt
    pytest
    pytest-asyncio
    pytest-cov
commands =
    # Audits logic core (Hub 01) and spatial engine with coverage [3, 4]
    pytest --cov=schematics --cov=models --cov-report=term-missing {posargs:test/}

[testenv:lint]
description = Enforce Black and isort formatting standards
deps =
    black
    isort
commands =
    isort --check-only .
    black --check .

[testenv:security]
description = Audit "Void-Tech" orchestration for vulnerabilities
deps =
    bandit
commands =
    # Scans the AI orchestration and model directories [5]
    bandit -r schematics/ models/ -x test/

[pytest]
# Registers markers to fix PytestUnknownMarkWarning for Hub 06/01 tests [History]
markers =
    hardware: tests requiring physical Hailo-8L NPU or Edge TPU connectivity
# Ensures asyncio tests for Stargate nodes run correctly
asyncio_mode = strict
