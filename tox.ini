[tox]
envlist = py310, py311, lint, security
isolated_build = True

[testenv]
description = Run the Skynet distributed test suite with coverage
passenv = 
    VERTEX_AI_KEY
    GEMINI_API_KEY
deps =
    -rrequirements.txt
    pytest
    pytest-asyncio
    pytest-cov
commands =
    pytest --cov=src/schematics --cov=src/models --cov-report=term-missing {posargs:test/}

[testenv:lint]
description = Enforce Black and isort formatting standards
deps =
    black
    isort
commands =
    isort --check-only .
    black --check .

[testenv:security]
description = Audit "Void-Tech" orchestration for vulnerabilities
deps =
    bandit
commands =
    bandit -r src/schematics/ src/models/ -x test/

[pytest]
pythonpath = . src src/skynet src/schematics
testpaths = test
markers =
    hardware: tests requiring physical Hailo-8L NPU or Edge TPU connectivity
asyncio_mode = strict
