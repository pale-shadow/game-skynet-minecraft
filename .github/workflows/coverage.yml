name: Python Code Coverage

on:
  pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install pytest-cov to resolve the 'unrecognized arguments' error
        pip install -r requirements.txt pytest pytest-asyncio pytest-cov black isort

    - name: Run Tests with Coverage
      # This matches your Makefile 'test' target logic
      run: |
        pytest --cov=schematics --cov=models test/
