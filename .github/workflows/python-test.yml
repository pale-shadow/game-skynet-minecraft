name: Skynet Unified Test Suite

on:
  pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Dependencies
        # Synchronizes with your requirements.txt and installs coverage tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio pytest-cov black isort

      - name: Run Orchestration Tests
        # Executes the core logic tests for the Inference Nexus (Hub 01)
        run: |
          pytest test/test_gemini_link.py test/test_brain.py
          pytest test/test_rcon.py

      - name: Run Full Suite with Coverage
        # Audits the T2BM model with coverage reporting
        run: pytest --cov=schematics --cov=models test/
