[loggers]
keys=root,skynet,stargate,website,mcserver,adaptive_mutation,vision_overseer,skynet_core,skynet_unified,skynet_agent,skynet_controller,skynet_self_aware,ai_signs,stargate_telemetry_listener

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=detailedFormatter,simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_skynet]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=skynet
propagate=0

[logger_stargate]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=stargate
propagate=0

[logger_website]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=website
propagate=0

[logger_mcserver]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=mcserver
propagate=0

[logger_adaptive_mutation]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=adaptive_mutation
propagate=0

[logger_vision_overseer]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=vision_overseer
propagate=0

[logger_skynet_core]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=skynet_core
propagate=0

[logger_skynet_unified]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=skynet_unified
propagate=0

[logger_skynet_agent]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=skynet_agent
propagate=0

[logger_skynet_controller]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=skynet_controller
propagate=0

[logger_skynet_self_aware]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=skynet_self_aware
propagate=0

[logger_ai_signs]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=ai_signs
propagate=0

[logger_stargate_telemetry_listener]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=stargate_telemetry_listener
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=logging.handlers.RotatingFileHandler
level=DEBUG
formatter=detailedFormatter
# Expected to be passed via 'defaults' in fileConfig, e.g., 'logs/skynet.log'
args=('%(logfilename)s', 'a', 10485760, 5)

[formatter_detailedFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s

[formatter_simpleFormatter]
format=%(levelname)s - %(name)s - %(message)s
